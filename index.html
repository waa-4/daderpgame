<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0b1020">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DaDerpGame v1.2</title>
  <link rel="stylesheet" href="style.css?v=12-camera-joystick-20260625">
</head>
<body>
  <section id="lobby" class="screen show">
    <main class="card">
      <div class="brand"><i></i><div><h1>DaDerpGame</h1><p>private cube hangout + drawing chaos</p></div></div>
      <div class="inputs">
        <label>Name<input id="name" maxlength="18" placeholder="Derp"></label>
        <label>Cube color<input id="color" type="color" value="#46d7ff"></label>
      </div>
      <button id="create" class="primary">Create Private Room</button>
      <div class="join"><input id="code" maxlength="8" placeholder="ROOM CODE"><button id="join">Join</button></div>
      <button id="local" class="ghost">Create Local Two-Tab Room</button>
      <div id="status">Ready — movement build v1.2 loaded.</div>
      <small>WASD / arrow keys move the cube. Touch devices get a joystick. The camera follows your cube.</small>
    </main>
  </section>

  <section id="game" class="screen">
    <canvas id="canvas" tabindex="0"></canvas>
    <header>
      <span>ROOM <b id="room">------</b></span>
      <span id="conn" class="offline">offline</span>
      <button id="copy">Copy</button>
      <button id="leave" class="danger">Leave</button>
    </header>
    <aside id="players" class="panel"><h2>Players</h2><div id="playerList"></div></aside>
    <aside id="tools" class="panel">
      <h2>Stuff</h2>
      <div><button id="draw">Draw: OFF</button><input id="brush" type="color" value="#ff4fc3"><input id="size" type="range" min="2" max="24" value="7"></div>
      <div><button id="undo">Undo Mine</button><button id="clear">Clear All</button></div>
      <div><button data-msg="hello!">hello!</button><button data-msg="follow me">follow me</button><button data-msg="LOL">LOL</button></div>
      <div><button id="random">Random Cube</button><button id="spawn">Spawn</button></div>
      <p>Draw in the pink zone. Walk into pads. Press E/USE near a ball.</p>
    </aside>
    <div id="mobile">
      <div id="joy"><i></i></div>
      <button id="mDraw">DRAW</button>
      <button id="use">USE</button>
    </div>
    <div id="toast"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=12-camera-joystick-20260625"></script>
  <script src="multiplayer.js?v=12-camera-joystick-20260625"></script>
  <script src="game.js?v=12-camera-joystick-20260625"></script>
  <script>
    window.addEventListener('error', function (event) {
      var status = document.getElementById('status');
      if (status) status.textContent = 'JavaScript error: ' + event.message;
    });
  </script>
</body>
</html>
